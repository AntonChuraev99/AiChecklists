<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gisti — AI Checklists</title>
    <meta name="description" content="Transform any content into actionable checklists using AI. Photo, PDF, voice — get structured tasks instantly.">
    <meta name="theme-color" content="#2196F3">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            z-index: 9999;
            color: #2196F3;
            transition: opacity 0.3s ease-out;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #E3F2FD;
            border-top-color: #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #212121;
        }
        .hint {
            font-size: 12px;
            color: #757575;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div class="logo-text">Gisti — AI Checklists</div>
        <div class="hint">Loading...</div>
    </div>
    <script type="application/javascript">
        // Hide loader once the Compose canvas mounts. Poll-based to avoid races
        // with synchronous canvas creation during WASM init.
        (function () {
            const tryHide = () => {
                const c = document.querySelector('canvas');
                if (c && c.width > 0) {
                    document.getElementById('loading')?.classList.add('hidden');
                    return true;
                }
                return false;
            };
            if (!tryHide()) {
                const interval = setInterval(() => {
                    if (tryHide()) clearInterval(interval);
                }, 100);
                // Safety timeout — drop loader after 60s regardless
                setTimeout(() => {
                    clearInterval(interval);
                    document.getElementById('loading')?.classList.add('hidden');
                }, 60000);
            }
        })();
    </script>
    <script type="module" src="./init.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gisti — AI Checklists</title>
    <meta name="description" content="Transform any content into actionable checklists using AI. Photo, PDF, voice — get structured tasks instantly.">
    <meta name="theme-color" content="#2196F3">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="./favicon.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            z-index: 9999;
            color: #2196F3;
            transition: opacity 0.3s ease-out;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #E3F2FD;
            border-top-color: #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #212121;
        }
        .hint {
            font-size: 12px;
            color: #757575;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div class="logo-text">Gisti — AI Checklists</div>
        <div class="hint">Loading...</div>
    </div>
    <script type="application/javascript">
        // === Nuclear reset: clear corrupted Compose Resources CacheStorage ===
        // Compose Multiplatform caches .cvr (string) and .png (drawable) files
        // in a persistent CacheStorage named compose_web_resources_cache.
        // Once corrupted (bad bytes, stale SW, Base64 padding mismatch), the
        // cache persists through refreshes → Base64 decode crash → UI freeze.
        // One-time clear for all users; version bump forces re-clear.
        (function() {
            var RESET_KEY = '__gistiCacheClearV3';
            if (typeof caches !== 'undefined' && !localStorage.getItem(RESET_KEY)) {
                window.__clearingData = true;
                caches.keys().then(function(names) {
                    return Promise.all(names.map(function(n) { return caches.delete(n); }));
                }).then(function() {
                    localStorage.setItem(RESET_KEY, '1');
                    location.reload();
                }).catch(function() {
                    localStorage.setItem(RESET_KEY, '1');
                    location.reload();
                });
                return;
            }
        })();
    </script>
    <script type="application/javascript">
        // === Fetch cache-bust for Compose Resources ===
        // Browser HTTP disk cache may hold corrupted .cvr bytes (Base64 padding
        // mismatch → IllegalArgumentException → Compose rendering coroutine dies
        // → UI frozen on splash). CacheStorage clear doesn't fix this — it's the
        // browser's built-in HTTP cache that serves stale 304 responses.
        //
        // Two-tier strategy installed in ONE fetch wrapper:
        //   Tier A (DURABLE, always on): every .cvr fetch forces `cache: 'reload'`,
        //     so a poisoned/stale .cvr can never be reused across deploys. This is
        //     the root-cause fix — it cannot be gated, or corruption would persist
        //     until the next version-key bump. .cvr files are tiny text bundles, so
        //     the re-download cost per load is negligible (a few KB).
        //   Tier B (ONE-TIME sweep): also reload non-.cvr composeResources (fonts,
        //     images) exactly once per user, to flush any already-poisoned binary
        //     assets after a deploy. Gated by BUST_KEY so we don't re-download the
        //     larger font/image assets on every page load.
        // Scope is composeResources only — app/network fetches are untouched.
        (function() {
            var BUST_KEY = '__gistiFetchBustV3';
            var sweepNonCvr = !localStorage.getItem(BUST_KEY);
            var _origFetch = window.fetch;
            window.fetch = function(input, init) {
                var url = typeof input === 'string' ? input : (input && input.url) || '';
                var isCvr = url.indexOf('.cvr') !== -1;
                var isResource = isCvr || url.indexOf('composeResources') !== -1;
                // Always bust .cvr (durable); bust other composeResources only during
                // the one-time post-deploy sweep.
                if (isCvr || (sweepNonCvr && isResource)) {
                    init = Object.assign({}, init || {}, { cache: 'reload' });
                    if (isCvr) {
                        console.log('[FETCH-BUST] .cvr network-fresh:', url);
                    } else {
                        console.log('[FETCH-BUST] one-time sweep:', url);
                    }
                }
                return _origFetch.call(this, input, init);
            };
            // Disable only the non-.cvr sweep after first load; .cvr stays durable.
            if (sweepNonCvr) {
                setTimeout(function() {
                    localStorage.setItem(BUST_KEY, '1');
                    sweepNonCvr = false;
                }, 15000);
            }
        })();
    </script>
    <script type="application/javascript">
        // === Recovery: ?clear-data wipes all browser storage and reloads ===
        (function() {
            var params = new URLSearchParams(location.search);
            if (params.has('clear-data')) {
                window.__clearingData = true;
                var hint = document.querySelector('.hint');
                if (hint) hint.textContent = 'Clearing data...';

                (async function() {
                    try { localStorage.clear(); } catch(e) {}
                    try { sessionStorage.clear(); } catch(e) {}
                    try {
                        if (typeof indexedDB !== 'undefined' && indexedDB.databases) {
                            var dbs = await indexedDB.databases();
                            await Promise.all(dbs.map(function(db) {
                                return new Promise(function(ok) {
                                    var r = indexedDB.deleteDatabase(db.name);
                                    r.onsuccess = r.onerror = ok;
                                });
                            }));
                        }
                    } catch(e) {}
                    try {
                        if (navigator.storage && navigator.storage.getDirectory) {
                            var root = await navigator.storage.getDirectory();
                            for await (var name of root.keys()) {
                                await root.removeEntry(name, { recursive: true });
                            }
                        }
                    } catch(e) {}
                    try {
                        if (typeof caches !== 'undefined') {
                            var names = await caches.keys();
                            await Promise.all(names.map(function(n) { return caches.delete(n); }));
                        }
                    } catch(e) {}
                    var url = new URL(location);
                    url.searchParams.delete('clear-data');
                    location.replace(url.toString());
                })();
                return;
            }
        })();
    </script>
    <script type="application/javascript">
        // Hide loader once the Compose canvas mounts. Poll-based to avoid races
        // with synchronous canvas creation during WASM init.
        (function () {
            var tryHide = function() {
                var c = document.querySelector('canvas');
                if (c && c.width > 0) {
                    var el = document.getElementById('loading');
                    if (el) el.classList.add('hidden');
                    return true;
                }
                return false;
            };
            if (!tryHide()) {
                var interval = setInterval(function() {
                    if (tryHide()) clearInterval(interval);
                }, 100);
                // Show recovery hint after 12 seconds of loading
                setTimeout(function() {
                    var loading = document.getElementById('loading');
                    if (loading && !loading.classList.contains('hidden')) {
                        var hint = loading.querySelector('.hint');
                        if (hint) hint.innerHTML = 'Taking too long? <a href="?clear-data" style="color:#2196F3;text-decoration:underline">Clear site data</a> · <a href="javascript:void(0)" onclick="location.reload(true)" style="color:#2196F3;text-decoration:underline">Hard refresh</a>';
                    }
                }, 12000);
                // Safety timeout — drop loader after 60s regardless
                setTimeout(function() {
                    clearInterval(interval);
                    var el = document.getElementById('loading');
                    if (el) el.classList.add('hidden');
                }, 60000);
            }
        })();
    </script>
    <script>
        // Override Navigator.languages / Navigator.language so that Compose
        // Resources resolves stringResource() from the user-selected locale
        // instead of the browser's OS default.
        //
        // window.__customLocale is set by AppLocale.wasmJs.kt (actual for
        // LocalAppLocale.provides) whenever the user picks a language in Settings.
        // It is null/undefined on first load → falls back to original browser langs.
        //
        // IMPORTANT: this shim must execute BEFORE init.js so that Skiko / Compose
        // reads the patched navigator.language during startup locale detection.
        (function () {
            var originalLanguages = navigator.languages;
            var originalLanguage = navigator.language;
            try {
                Object.defineProperty(navigator, 'languages', {
                    configurable: true,
                    get: function () {
                        return window.__customLocale ? [window.__customLocale] : originalLanguages;
                    }
                });
                Object.defineProperty(navigator, 'language', {
                    configurable: true,
                    get: function () {
                        return window.__customLocale || originalLanguage;
                    }
                });
            } catch (e) {
                // In environments where navigator properties are not configurable
                // (some embedded WebViews / strict CSPs) the shim silently degrades —
                // the app falls back to the browser's OS locale.
                console.warn('[Gisti] Navigator locale shim not applied:', e);
            }
        })();
    </script>
    <script type="module" src="./init.js"></script>
</body>
</html>
